{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocSearch</title>
    <link rel="stylesheet" href="{% static 'search/css/style.css' %}" />
  </head>
  <body>
    <div class="page" id="page">
      <header class="hero" id="hero">
        <h1 class="logo">DocSearch</h1>

        <form class="search-form" id="search-form" method="get" action="">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
            <input
              type="search"
              id="search-input"
              name="q"
              value="{{ query }}"
              placeholder="Search your documents"
              autocomplete="off"
              autofocus
            />
          </div>

          <div class="search-buttons">
            <button type="submit" class="btn-search">DocSearch</button>
          </div>
        </form>

        <p id="search-status" class="search-status" aria-live="polite"></p>
      </header>

      <main class="main" id="main" hidden>
        <section class="results-wrap" id="results-panel" aria-label="Search results">
          <p class="results-stats" id="results-header" hidden></p>
          <ul class="results-list" id="results-list"></ul>
        </section>
      </main>
    </div>

    <script src="{% static 'search/js/app.js' %}"></script>
  </body>
</html>
