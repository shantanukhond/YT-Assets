services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-embeddings
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pgvector_net

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "Pulling ${OLLAMA_EMBED_MODEL:-nomic-embed-text}..."
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    networks:
      - pgvector_net
    restart: "no"

  postgres:
    build: .
    container_name: pgvector-demo
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectordb
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - pgvector_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vectordb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
  ollama_data:

networks:
  pgvector_net:
    name: pgvector_net
